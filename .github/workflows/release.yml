name: Release — Windows x64

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install build dependencies
        run: pip install pyinstaller pyinstaller-hooks-contrib pypdf tqdm pywin32

      - name: Build executables
        run: pyinstaller docx_to_pdf.spec --clean --noconfirm

      - name: Smoke-test CLI exe
        run: |
          .\dist\docx-to-pdf.exe --help

      - name: Create release archive
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive `
            -Path dist\docx-to-pdf.exe, dist\docx-to-pdf-gui.exe `
            -DestinationPath "docx-to-pdf-$tag-win-x64.zip"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: docx-to-pdf-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
